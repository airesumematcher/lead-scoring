# Moody's account scoring model — derived from Louise's live account scoring spreadsheet (04.03)
# Total Account Score = CS Score + CTR Score + Site Visit Score + MLI Score + Top Topic Score
# Intent tier: High ≥ 41, Med 20–40, Low < 20
moodys_account_scoring:
  cs_score_tiers:
    # content syndication leads → CS score points
    - {min_leads: 0, max_leads: 0, score: 0}
    - {min_leads: 1, max_leads: 1, score: 5}
    - {min_leads: 2, max_leads: 2, score: 10}
    - {min_leads: 3, max_leads: 3, score: 15}
    - {min_leads: 4, score: 20}
  ctr_score_tiers:
    # display click-through rate (%) → CTR score points
    - {min_ctr: 0.0,  max_ctr: 0.0,  score: 0}
    - {min_ctr: 0.01, max_ctr: 0.19, score: 5}
    - {min_ctr: 0.20, max_ctr: 1.26, score: 10}
    - {min_ctr: 1.27, score: 15}
  site_visit_score_tiers:
    # site visits → site visit score points
    - {min_visits: 0,   max_visits: 0,   score: 0}
    - {min_visits: 1,   max_visits: 20,  score: 5}
    - {min_visits: 21,  max_visits: 224, score: 10}
    - {min_visits: 225, score: 15}
  intent_thresholds:
    high: 41
    med: 20
    # below med threshold = Low

