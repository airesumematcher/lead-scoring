thresholds:
  deliver_score: 68
  review_score: 50
  predicted_approval_score: 55
  high_fit_score: 65
  high_intent_score: 55
  bdr_trigger_personas: 2
  bdr_dm_coverage_pct: 50
  # Account-level action thresholds
  account_accelerate_score: 70  # account_score >= 70 → accelerate (immediate outreach)
  account_engage_score: 45      # account_score >= 45 → engage (nurture sequence)
  # Below account_engage_score → hold

buying_group_role_weights:
  Decision-Maker: 0.40
  Influencer: 0.25
  Champion: 0.15
  User: 0.10
  Gatekeeper: 0.10

weights:
  approval:
    fit_score: 0.34
    intent_score: 0.27
    partner_signal_score: 0.22
    data_quality_score: 0.10
    icp_match_score: 0.07
  buying_group:
    unique_persona_count: 0.35
    persona_completeness_score: 0.25
    journey_stage_score: 0.20
    account_history_score: 0.20
  account:
    # Account-level scoring weights (used by /accounts/score)
    # Intent is the strongest signal: third-party surges predict active buying cycles
    intent: 0.40
    # Firmographic trajectory: growth, funding, executive change
    firmographic: 0.25
    # Buying group maturity: how many persona functions have engaged platform-wide
    buying_group_maturity: 0.25
    # Data completeness bonus (remaining 10% allocated in engine)
    data_completeness: 0.10

engagement_weights:
  open: 8
  click: 16
  download: 22
  visit: 10
  email_two_multiplier: 1.5
  recency_half_life_days: 21
