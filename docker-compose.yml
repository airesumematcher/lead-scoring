version: '3.9'

services:
  # PostgreSQL database service
  postgres:
    image: postgres:15-alpine
    container_name: lead_scoring_db
    environment:
      POSTGRES_USER: lead_user
      POSTGRES_PASSWORD: lead_password_dev
      POSTGRES_DB: lead_scoring_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lead_user -d lead_scoring_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lead_scoring_network

  # Redis for caching/sessions (optional, recommended for production)
  redis:
    image: redis:7-alpine
    container_name: lead_scoring_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lead_scoring_network

  # Lead Scoring API application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lead_scoring_api
    environment:
      DATABASE_URL: postgresql://lead_user:lead_password_dev@postgres:5432/lead_scoring_db
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: DEBUG
      APP_ENV: development
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./scripts:/app/scripts
      - ./models:/app/models
      - ./data_processed:/app/data_processed
      - ./index.html:/app/index.html
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lead_scoring_network
    command: uvicorn src.lead_scoring.api.app:app --host 0.0.0.0 --port 8000 --reload

  # Nginx reverse proxy (optional, for production-like setup)
  nginx:
    image: nginx:alpine
    container_name: lead_scoring_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - lead_scoring_network

networks:
  lead_scoring_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
