[pytest]
# Pytest configuration

# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cache-clear

# Markers for categorizing tests
markers =
    unit: Unit tests for individual modules
    integration: Integration tests across modules
    api: API endpoint tests
    slow: Tests that take significant time
    feature_extraction: Feature engineering tests
    scoring: Scoring pipeline tests
    feedback: Feedback loop tests

# Coverage options
[coverage:run]
branch = True
source = lead_scoring
omit =
    */tests/*
    */test_*.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == .__main__.:
    raise AssertionError
    raise NotImplementedError
    if 0:
    if False:
    if TYPE_CHECKING:
    @abstractmethod
