apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lead-scoring-api-pdb
  namespace: lead-scoring
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: lead-scoring-api
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lead-scoring-api-netpol
  namespace: lead-scoring
spec:
  podSelector:
    matchLabels:
      app: lead-scoring-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          name: lead-scoring
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 9090
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: lead-scoring-quota
  namespace: lead-scoring
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "20Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    pods: "50"
    services: "10"
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: lead-scoring-limits
  namespace: lead-scoring
spec:
  limits:
  - max:
      cpu: "2"
      memory: "2Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "250m"
      memory: "256Mi"
    type: Container
