apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: lead-scoring

namespace: lead-scoring

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - postgres.yaml
  - deployment.yaml
  - hpa-ingress.yaml
  - resilience.yaml

commonLabels:
  app: lead-scoring
  version: v1
  managed-by: kustomize

commonAnnotations:
  description: "B2B ABM Lead Scoring System"
  team: "ML Platform"
  environment: "production"

images:
  - name: lead-scoring
    newTag: latest
    newName: lead-scoring

replicas:
  - name: lead-scoring-api
    count: 3

vars:
  - name: DATABASE_HOST
    objref:
      kind: Service
      name: postgres
      apiVersion: v1
    fieldref:
      fieldpath: metadata.name
  - name: DATABASE_PORT
    objref:
      kind: Service
      name: postgres
      apiVersion: v1
    fieldref:
      fieldpath: spec.ports[0].port

replacements:
  - source:
      kind: Service
      name: postgres
      fieldPath: metadata.name
    targets:
      - select:
          kind: Deployment
        fieldPaths:
          - spec.template.spec.containers[0].env[0].value
