apiVersion: v1
kind: ConfigMap
metadata:
  name: lead-scoring-config
  namespace: lead-scoring
data:
  LOG_LEVEL: "INFO"
  APP_ENV: "production"
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  # API configuration
  API_WORKERS: "4"
  API_TIMEOUT: "120"
  # Database configuration
  DB_POOL_SIZE: "20"
  DB_MAX_OVERFLOW: "40"
  DB_POOL_TIMEOUT: "30"
  # Monitoring
  ENABLE_METRICS: "true"
  METRICS_PORT: "9090"
  # Feature flags
  ENABLE_BATCH_PROCESSING: "true"
  ENABLE_FEEDBACK_LOOP: "true"
  # Scaling parameters
  BATCH_SIZE: "100"
  BATCH_TIMEOUT_SECONDS: "300"
