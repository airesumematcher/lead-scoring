apiVersion: v1
kind: Secret
metadata:
  name: lead-scoring-secrets
  namespace: lead-scoring
type: Opaque
stringData:
  # Database credentials (change in production!)
  DATABASE_URL: "postgresql://lead_user:lead_password@postgres:5432/lead_scoring_db"
  DB_USER: "lead_user"
  DB_PASSWORD: "lead_password"
  # Redis URL (if using Redis)
  REDIS_URL: "redis://redis:6379/0"
  # API keys and secrets (add as needed)
  API_KEY_SECRET: "change-me-in-production"
  JWT_SECRET: "change-me-in-production"
  # CORS allowed origins
  ALLOWED_ORIGINS: "https://yourdomain.com,https://api.yourdomain.com"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: lead-scoring
type: Opaque
stringData:
  username: "lead_user"
  password: "lead_password"
